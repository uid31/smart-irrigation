<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div id="notify"></div>

<div class="sidebar">
  <h2>🌿 Smart Irrigation</h2>

  <a href="select.html">🏠 Home</a>
  <a href="#" onclick="setMode('auto')">🤖 Auto Mode</a>
  <a href="#" onclick="setMode('manual')">✋ Manual Mode</a>
  <a href="#" onclick="toggleWater()">💧 Water Toggle</a>
</div>

<div class="main">

  <h1>Live Dashboard</h1>

  <div class="grid">
    <div class="card">
      🌱 Moisture <h2 id="moisture">--</h2>
    </div>

    <div class="card">
      🌡 Temp <h2 id="temp">--</h2>
    </div>

    <div class="card">
      💧 Water <h2 id="water">--</h2>
    </div>
  </div>

  <canvas id="chart" width="400"></canvas>

</div>

<script src="app.js"></script>
</body>
</html>
