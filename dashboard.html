<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <div class="sidebar glass">
    <h3>🌿 Menu</h3>
    selection.html🌱 Selection</a>
    dashboard.html📊 Dashboard</a>
    <a onclick="logout()">🚪 Logout</a>
  </div>

  <div class="content">
    <h1>Live System</h1>

    <h3>Soil: <span id="soilType">--</span></h3>

    <div class="grid">
      <div class="glass">
        🌱 Moisture <h2 id="moisture">--</h2>
      </div>
      <div class="glass">
        🌡 Temperature <h2 id="temp">--</h2>
      </div>
      <div class="glass">
        💧 Water <h2 id="water">--</h2>
      </div>
    </div>
  </div>
</div>
<script src="app.js"></script

</body>
</html>
